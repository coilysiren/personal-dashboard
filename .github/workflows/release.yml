name: release

# Tag-only release on every push to main. Conventional commits drive the
# semver bump. Tag is created at the pushed commit, GH Release is cut
# with the auto-generated changelog, then bump-formula rewrites the
# Formula's url+tag+revision line via the Contents API (web-flow signed,
# satisfies the signed-commits ruleset).
#
# Brew install path is direct-repo (no aggregator tap):
#   brew tap coilysiren/personal-dashboard https://github.com/coilysiren/personal-dashboard
#   brew install coilysiren/personal-dashboard/personal-dashboard
#
# All ${{ }} interpolations are repo-controlled - no github.event.*
# untrusted input flows into a run block.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-formula:
    # Rewrite Formula/personal-dashboard.rb's url line to point at the
    # just-cut tag + revision. Brew reads the formula from the tap clone
    # (latest main), so the rewrite has to land back here. Commit message
    # carries the skip-CI marker so this push doesn't re-trigger the
    # release workflow.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula url via Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          path=Formula/personal-dashboard.rb
          tmp=$(mktemp -d)
          curl -fsSL \
            "https://raw.githubusercontent.com/${REPO}/main/${path}" \
            > "$tmp/personal-dashboard.rb"
          new_line="  url \"ssh://git@github.com/${REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          sed -i "s|^  url \".*|${new_line}|" "$tmp/personal-dashboard.rb"
          cur_sha=$(gh api "repos/${REPO}/contents/${path}?ref=main" --jq .sha)
          new_b64=$(base64 -w0 < "$tmp/personal-dashboard.rb")
          gh api -X PUT "repos/${REPO}/contents/${path}" \
            -f message="chore(formula): bump to ${TAG} [skip ci]" \
            -f content="$new_b64" \
            -f sha="$cur_sha" \
            -f branch=main

  deploy-kai-server:
    needs: [release, bump-formula]
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
      REPO: ${{ github.repository }}
    steps:
      - name: Wait for local Formula to carry the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # bump-formula PUTs the Formula via Contents API on this repo's
        # main. Poll the Contents API (not the raw CDN, which caches
        # aggressively for 5+ min) until the file carries the new tag.
        # Capped at ~3 min.
        run: |
          set -euo pipefail
          path=Formula/personal-dashboard.rb
          for i in $(seq 1 18); do
            content=$(gh api "repos/${REPO}/contents/${path}" --jq .content | base64 -d || true)
            if grep -q "tag: \"${TAG}\"" <<< "$content"; then
              echo "formula carries $TAG"
              exit 0
            fi
            echo "waiting for formula bump (attempt $i)..."
            sleep 10
          done
          echo "formula never landed $TAG; aborting"
          exit 1

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          use-cache: 'true'

      - name: Trigger personal-dashboard-update on kai-server
        # Tailscale SSH handles auth via the tailnet ACL; no keys on the
        # runner. coily systemctl self-elevates via the broad NOPASSWD
        # coily sudoers rule (coily#203), so the bare ssh exec works
        # under non-TTY without a per-unit sudoers carveout. Output of
        # the unit shows up via journalctl on kai-server; we just need
        # to know the start call was accepted here.
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new kai@kai-server \
            'coily systemctl start personal-dashboard-update.service'
          echo "triggered personal-dashboard-update.service on kai-server"
