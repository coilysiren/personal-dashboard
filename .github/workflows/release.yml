name: release

# Tag-only release on every push to main. Mirrors
# coilysiren/repo-recall/.github/workflows/release.yml.
#
# 1. Every commit triggers at least a patch bump. Conventional-commit
#    subjects bump higher:
#      <plain>    -> patch       fix: ...     -> patch
#      feat: ...  -> minor       feat!: ...   -> major  (also BREAKING CHANGE:)
# 2. Tag is created at the pushed commit. No commit is written back to main.
# 3. A GitHub Release is cut with the auto-generated changelog.
# 4. The new tarball sha256 is computed, then a repository_dispatch is
#    fired to coilysiren/homebrew-tap whose own bump-personal-dashboard
#    workflow rewrites Formula/personal-dashboard.rb via the Contents
#    API. The receiver lives in homebrew-tap so the commit is signed by
#    GitHub's web-flow key (only installation-token API commits are
#    auto-signed) and clears the signed-commits ruleset.
#
# Formula/personal-dashboard.rb in this repo is the source of truth.
# bump-personal-dashboard fetches it at the release tag, sed-patches url
# + sha256, and PUTs the result to the tap.
#
# All interpolations below are repo-controlled (action outputs, job
# needs, secrets). No github.event.* untrusted input flows into run
# blocks.
#
# Manual setup (one-time, requires Kai):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/personal-dashboard
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            Repository permissions -> Contents: Read and write

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Compute tarball sha256
        id: sha
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          url="https://github.com/coilysiren/personal-dashboard/archive/refs/tags/${TAG}.tar.gz"
          for i in 1 2 3 4 5; do
            if sha=$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1); then
              break
            fi
            sleep 5
          done
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Dispatch bump to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          NEW_URL: ${{ steps.sha.outputs.url }}
          NEW_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          gh api -X POST repos/coilysiren/homebrew-tap/dispatches \
            -f event_type=bump-personal-dashboard \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[url]=${NEW_URL}" \
            -f "client_payload[sha]=${NEW_SHA}"

  deploy-kai-server:
    needs: [release, bump-tap]
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Wait for tap to carry the new tag
        env:
          TAG: ${{ needs.release.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # bump-personal-dashboard runs in homebrew-tap and PUTs the
        # Formula via Contents API. Poll the Contents API (not the raw
        # CDN, which caches aggressively for 5+ min) until the file
        # carries the new tag. Capped at ~3 min.
        run: |
          set -euo pipefail
          path=Formula/personal-dashboard.rb
          for i in $(seq 1 18); do
            content=$(gh api "repos/coilysiren/homebrew-tap/contents/${path}" --jq .content | base64 -d || true)
            if grep -q "/${TAG}.tar.gz\"" <<< "$content"; then
              echo "tap carries $TAG"
              exit 0
            fi
            echo "waiting for tap bump (attempt $i)..."
            sleep 10
          done
          echo "tap never landed $TAG; aborting"
          exit 1

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          use-cache: 'true'

      - name: Trigger personal-dashboard-update on kai-server
        # Tailscale SSH handles auth via the tailnet ACL; no keys on the
        # runner. The unit sudoers entry is NOPASSWD so the bare ssh
        # exec works under non-TTY. Output of the unit shows up via
        # journalctl on kai-server; we just need to know the start call
        # was accepted here.
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new kai@kai-server \
            'sudo systemctl start personal-dashboard-update.service'
          echo "triggered personal-dashboard-update.service on kai-server"
